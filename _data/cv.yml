    Experience:
      - company: MD Anderson Cancer Center
        position: Graduate Research Assistant, Van Loo Lab
        location: Houston, TX
        start_date: 2022-05
        end_date: present
        highlights:
          - "Develop and optimize computational pipelines in R, Python, and Snakemake for analysis of bulk and single-cell DNA sequencing and RNA-seq data across multiple cancer types, including ovarian, oral, renal, lung, and biliary cancers"
          - "Pioneering a novel single-cell copy number variant (CNV) detection method to resolve intratumoral heterogeneity and inform models of cancer evolution and clonal dynamics"
          - Integrate multi-omic datasets to characterize how molecular alterations drive cancer progression and metastasis, linking genomic features to clinical phenotypes and patient outcomes"
          - Apply statistical and computational frameworks to clinical risk stratification using tumor genomic profiles, translating biological findings into clinically actionable insights"
          - Collaborate within a multidisciplinary research team while independently managing concurrent analysis workflows across diverse cancer cohorts"

      - company: MD Anderson Cancer Center
        position: Research Data Coordinator, Department of Surgical Oncology
        location: Houston, TX
        start_date: 2020-11
        end_date: 2022-05
        highlights:
          - "Curated and maintained the Medullary Thyroid Carcinoma Registry, managing end-to-end data abstraction from clinical systems (EPIC, REDCap) and ensuring data integrity across patient records for longitudinal research use"
          - "Designed and executed epidemiological investigations using registry data to support drug research and clinical decision-making, producing routine analytical reports for stakeholder review"
          - "Translated complex clinical and genomic registry data into structured datasets, enabling downstream statistical analysis and population-level insights into Medullary Thyroid Cancer"
          - "Communicated research findings through presentations to cross-functional audiences including clinicians, researchers, and patients, demonstrating strong scientific communication skills"
          - "Trained and mentored graduate students in clinical data management best practices, supporting team-wide research productivity"

